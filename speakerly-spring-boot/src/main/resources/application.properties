spring.datasource.url=jdbc:mysql://localhost:3306/speakerly_db
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8080

# JWT Secrets
jwt.secret=speakerly_jwt_secret_key_256bit_minimum_length_here_must_be_long_enough
jwt.expiration=86400000

# Razorpay Keys
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# Agora Keys
agora.app.id=YOUR_AGORA_APP_ID
agora.app.certificate=YOUR_AGORA_CERTIFICATE
